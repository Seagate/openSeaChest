# SPDX-License-Identifier: MPL-2.0
name: VMActions CI for meson build

on: [push]

jobs:
  omnios:
    runs-on: ubuntu-latest
    name: Build openSeaChest for omnios
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Build openSeaChest for OmniOS
      id: omni
      uses: vmactions/omnios-vm@v1
      with:
        usesh: true
        prepare: |
          pkg install pkg:/package/pkg
          pkg update
          pkg install socat

        run: |
          pkg install bison build-essential flex ninja pkg-config

          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install meson
          meson setup build -Dprefix=/ -Dmandir=/man -Dbindir=/ --buildtype=release
          meson install -C build

  solaris:
    runs-on: ubuntu-latest
    name: Build openSeaChest for Solaris
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Build openSeaChest for Solaris
      id: sol
      uses: vmactions/solaris-vm@v1
      with:
        release: "11.4-gcc"
        usesh: true
        prepare: |
          pkg update --accept || true
          pkgutil -y -i socat

          ntpdate -u pool.ntp.org

        run: |
          pkg install --accept developer/build/meson

          meson setup build -Dprefix=/ -Dmandir=/man -Dbindir=/ --buildtype=release
          meson install -C build

  freebsd:
    runs-on: ubuntu-latest
    name: Build openSeaChest for FreeBSD
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "FreeBSD 14.3",
            releasename: "14.3",
            arch: "x86_64",
          }
        # - {
        #     name: "FreeBSD 15.0",
        #     releasename: "15.0",
        #     arch: "x86_64",
        #   }
        - {
            name: "FreeBSD 13.5",
            releasename: "13.5",
            arch: "x86_64",
          }
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Build openSeaChest for ${{ matrix.config.name }}
      id: freebsd
      uses: vmactions/freebsd-vm@v1
      with:
        release: ${{ matrix.config.releasename }}
        arch: ${{ matrix.config.arch }}
        usesh: true
        prepare: |
          pkg update
          pkg install -y curl
          pkg install -y ntp
          ntpdate -u pool.ntp.org

        run: |
          pkg install -y meson

          meson setup build -Dprefix=/ -Dmandir=/man -Dbindir=/ --buildtype=release
          meson install -C build

  dragonflybsd:
    runs-on: ubuntu-latest
    name: Build openSeaChest for DragonflyBSD
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Build openSeaChest for  DragonflyBSD
      id: dragonfly
      uses: vmactions/dragonflybsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg update
          pkg install -y socat
          /usr/sbin/dntpd -s

        run: |
          pkg install -y meson

          meson setup build -Dprefix=/ -Dmandir=/man -Dbindir=/ --buildtype=release
          meson install -C build

  openbsd:
    runs-on: ubuntu-latest
    name: Build openSeaChest for OpenBSD
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Build openSeaChest for OpenBSD
      id: openbsd
      uses: vmactions/openbsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg_add curl

          # force a sync in the VM
          ntpctl -s status || true


        run: |
          pkg_add meson

          meson setup build -Dprefix=/ -Dmandir=/man -Dbindir=/ --buildtype=release
          meson install -C build

  netbsd:
    runs-on: ubuntu-latest
    name: Build openSeaChest for NetBSD
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Build openSeaChest for NetBSD
      id: netbsd
      uses: vmactions/netbsd-vm@v1
      with:
        usesh: true
        prepare: |
          /usr/sbin/pkg_add curl
          /usr/sbin/pkg_add ntp
          
          # Write config file for ntpd to it will run properly
          cat <<EOF > /etc/ntp.conf
          driftfile /var/db/ntp.drift

          server 0.pool.ntp.org iburst
          server 1.pool.ntp.org iburst
          server 2.pool.ntp.org iburst

          restrict default kod nomodify notrap nopeer noquery
          restrict 127.0.0.1
          restrict ::1
          EOF


          /usr/pkg/sbin/ntpd -gq

        run: |
          /usr/sbin/pkg_add meson

          meson setup build -Dprefix=/ -Dmandir=/man -Dbindir=/ --buildtype=release
          meson install -C build